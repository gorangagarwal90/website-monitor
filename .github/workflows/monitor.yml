name: Website Monitor

on:
  schedule:
    - cron: "0 9 * * *"   # runs daily at 9 AM
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install puppeteer

      - name: Run script
        run: node index.js
